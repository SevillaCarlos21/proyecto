<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente | Ya casi listo...</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-blur"></div>

    <main class="main-container">
        <header>
            <div class="brand-logo">System Status</div>
        </header>

        <section class="content">
            <h1 id="main-title">Iniciando <span class="highlight">Configuración</span></h1>
            <p id="sub-text">Estamos preparando el entorno para ofrecerte una experiencia de usuario de alto nivel.</p>
            
            <div class="status-wrapper">
                <div class="progress-bar-container">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <span id="percentage-label" class="percentage-label">Progreso: 0%</span>
            </div>
        </section>

        <footer class="footer">
            <p>Preparado para ti</p>
            <p>&copy; 2026 | Desarrollo de Software Experimental</p>
        </footer>
    </main>

    <!-- Importante: El script va al final para asegurar que el HTML cargue primero -->
    <script src="script.js"></script>
</body>
</html>
